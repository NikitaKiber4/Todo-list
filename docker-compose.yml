version: '3.3'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: my_todo_postgres

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: sergey
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: todo_db

    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: